name: Dollar Price Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BRSAPI_KEY: ${{ secrets.BRSAPI_KEY }}
        run: python bot.py

      - name: Commit updated price file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_price.json || true
          git diff --staged --quiet || git commit -m "update last price"
          git push
